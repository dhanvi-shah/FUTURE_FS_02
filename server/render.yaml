services:
  - type: web
    name: minicrm-api
    runtime: node
    rootDir: .
    buildCommand: npm install --omit=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
      - key: CLIENT_URL
        value: https://future-fs-02-dhanvi1.vercel.app
